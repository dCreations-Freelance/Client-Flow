name: clientflow

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: clientflow/app:latest
    container_name: clientflow_app
    restart: always
    env_file:
      - .env
    volumes:
      - app_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clientflow
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(file_exists(\"/var/www/html/vendor/autoload.php\")?0:1);'"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: clientflow_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage/app/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - clientflow

  mysql:
    image: mysql:8.4
    container_name: clientflow_mysql
    restart: always
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - clientflow

volumes:
  mysql_data:
  app_storage:

networks:
  clientflow:
    driver: bridge
